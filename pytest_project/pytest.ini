[pytest]
addopts = -v --strict-markers -p no:warnings
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    format: Data formatting and regex checks
    business: Business logic and SLA validations
    dependency: Inter-field dependency validations
    temporal: Time and date related validations
    completeness: Null-check and schema validations

pythonpath = .
